services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_started
    restart: on-failure
    entrypoint: >
      bash -c "
        sleep 5 &&
        mongosh --host mongodb:27017 --eval \"
          try { rs.status() } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}) }
        \"
      "

  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_URL: mongodb://mongodb:27017/rusticated-kb?replicaSet=rs0
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
    depends_on:
      mongo-init:
        condition: service_completed_successfully

volumes:
  mongo_data:
